openapi: 3.0.0
info:
  title: BiteQuest Platform API
  version: 2.0.0
  description: |
    **فارسی:** مستندات جامع API پلتفرم BiteQuest — نسخه ۲ با معماری Organization/Branch.
    **English:** Comprehensive API documentation for BiteQuest platform — v2 with Organization/Branch architecture.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: توکن JWT خود را وارد کنید (بدون کلمه Bearer).

tags:
  - name: 1. Authentication
    description: احراز هویت پرسنل و مشتریان
  - name: 2. User Management
    description: مدیریت پرسنل و سطوح دسترسی
  - name: 3. Organizations
    description: مدیریت سازمان‌ها (برند مادر)
  - name: 4. Branches
    description: مدیریت شعب (لوکیشن‌های یک سازمان)
  - name: 5. Menu & Products
    description: مدیریت منوی غذا
  - name: 6. Cart & Orders
    description: سبد خرید و سفارشات مشتری
  - name: 7. Gamification & Campaigns
    description: مسابقات، کوییز و کدهای تخفیف
  - name: 8. CRM & Customers
    description: ارتباط با مشتریان و پیامک گروهی
  - name: 9. QR Codes
    description: تولید بارکد میزهای رستوران
  - name: 10. Analytics & Reports
    description: گزارشات مالی و آمار فروش
  - name: 11. Ticketing Support
    description: سیستم پشتیبانی و تیکت
  - name: 12. Audit Logs
    description: ردگیری فعالیت پرسنل
  - name: 13. SuperAdmin
    description: مدیریت کلان پلتفرم (فقط سوپرادمین)

paths:
  # ==========================================
  # 1. Authentication
  # ==========================================
  /api/v1/auth/staff-login:
    post:
      tags: [1. Authentication]
      summary: ورود پرسنل | Staff Login
      description: |
        ورود پرسنل (مدیر، گارسون، صندوق‌دار) با نام کاربری و رمز عبور.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: "admin_1" }
                password: { type: string, example: "Secret@123" }
      responses:
        '200': { description: "ورود موفق — توکن JWT برگردانده می‌شود" }
        '401': { description: "رمز عبور اشتباه است" }
        '403': { description: "شعبه غیرفعال یا اشتراک منقضی شده" }

  /api/v1/auth/me:
    get:
      tags: [1. Authentication]
      summary: پروفایل من | Get My Profile
      security:
        - BearerAuth: []
      responses:
        '200': { description: "اطلاعات کاربر/مشتری لاگین‌شده" }

  /api/v1/customers/auth/send-otp:
    post:
      tags: [1. Authentication]
      summary: درخواست کد تایید مشتری | Request OTP
      description: |
        ارسال پیامک ۵ رقمی به موبایل مشتری. هزینه از کیف پول پیامکی سازمان مادر کسر می‌شود.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, branchId]
              properties:
                phone: { type: string, example: "09123456789" }
                branchId: { type: string, example: "60d5ecb8b392d700153ef123" }
      responses:
        '200': { description: "پیامک ارسال شد" }
        '403': { description: "موجودی پیامکی سازمان کافی نیست" }

  /api/v1/customers/auth/verify-otp:
    post:
      tags: [1. Authentication]
      summary: تایید کد و ورود مشتری | Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string, example: "09123456789" }
                otp: { type: string, example: "12345" }
      responses:
        '200': { description: "ورود موفق — توکن JWT مشتری برگردانده می‌شود" }
        '401': { description: "کد تایید نامعتبر یا منقضی شده" }

  # ==========================================
  # 2. User Management
  # ==========================================
  /api/v1/users:
    get:
      tags: [2. User Management]
      summary: لیست پرسنل | Get All Users
      description: لیست کارمندان شعبه (نیاز به دسترسی USR-401).
      security:
        - BearerAuth: []
      responses:
        '200': { description: "لیست دریافت شد" }

    post:
      tags: [2. User Management]
      summary: ثبت کارمند جدید | Create User
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string, example: "waiter_ali" }
                password: { type: string, example: "Pass@123" }
                role: { type: string, enum: [staff, owner, manager, cashier], example: "staff" }
                permissions:
                  type: array
                  items: { type: string }
                  example: ["MNU-101", "ORD-302"]
      responses:
        '201': { description: "کارمند ثبت شد" }

  /api/v1/users/{id}:
    patch:
      tags: [2. User Management]
      summary: ویرایش کارمند | Update User
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, example: "manager" }
                permissions:
                  type: array
                  items: { type: string }
                  example: ["FIN-301", "USR-401"]
      responses:
        '200': { description: "آپدیت شد" }

    delete:
      tags: [2. User Management]
      summary: بایگانی کارمند | Archive User
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: "بایگانی شد" }

  /api/v1/users/change-my-password:
    patch:
      tags: [2. User Management]
      summary: تغییر رمز عبور شخصی | Change My Password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, example: "Old@Pass1" }
                newPassword: { type: string, example: "New@StrongPass2" }
      responses:
        '200': { description: "رمز تغییر کرد" }

  # ==========================================
  # 3. Organizations
  # ==========================================
  /api/v1/organizations:
    get:
      tags: [3. Organizations]
      summary: لیست سازمان‌ها | Get All Organizations
      description: لیست تمامی برندهای ثبت‌شده در پلتفرم (با فیلتر و صفحه‌بندی).
      responses:
        '200': { description: "لیست دریافت شد" }

    post:
      tags: [3. Organizations]
      summary: ثبت سازمان جدید (سوپرادمین) | Create Organization
      description: ایجاد برند/سازمان جدید با تنظیمات اشتراک.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, subscription]
              properties:
                name: { type: string, example: "زنجیره پیتزا نمونه" }
                slug: { type: string, example: "sample-pizza" }
                subscription:
                  type: object
                  properties:
                    plan: { type: string, enum: [basic, pro, enterprise], example: "pro" }
                    expiresAt: { type: string, format: date-time, example: "2027-01-01T00:00:00Z" }
      responses:
        '201': { description: "سازمان ساخته شد" }

  /api/v1/organizations/{identifier}:
    get:
      tags: [3. Organizations]
      summary: اطلاعات یک سازمان | Get Organization
      description: دریافت اطلاعات با ID یا slug.
      parameters:
        - in: path
          name: identifier
          required: true
          schema: { type: string }
          description: آیدی یا slug سازمان
      responses:
        '200': { description: "اطلاعات دریافت شد" }
        '404': { description: "سازمان پیدا نشد" }

    patch:
      tags: [3. Organizations]
      summary: ویرایش سازمان | Update Organization
      description: ویرایش نام یا مشخصات سازمان (نیاز به دسترسی ORG-602).
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: identifier
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: "ویرایش شد" }

  /api/v1/organizations/{id}/subscription:
    patch:
      tags: [3. Organizations]
      summary: مدیریت اشتراک (سوپرادمین) | Update Subscription
      description: تغییر پلن، وضعیت اشتراک یا شارژ کیف پول پیامکی.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [active, expired, suspended] }
                plan: { type: string, enum: [basic, pro, enterprise] }
                expiresAt: { type: string, format: date-time }
                smsWalletCharge: { type: number, example: 500, description: "تعداد پیامک شارژ شده" }
      responses:
        '200': { description: "اشتراک آپدیت شد" }

  # ==========================================
  # 4. Branches
  # ==========================================
  /api/v1/branches:
    get:
      tags: [4. Branches]
      summary: لیست شعب | Get All Branches
      description: لیست تمامی شعب با فیلتر بر اساس organizationId.
      parameters:
        - in: query
          name: organizationId
          schema: { type: string }
          description: فیلتر بر اساس سازمان مادر
      responses:
        '200': { description: "لیست دریافت شد" }

    post:
      tags: [4. Branches]
      summary: ثبت شعبه جدید (سوپرادمین) | Create Branch
      description: ایجاد شعبه جدید تحت یک سازمان.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [organizationId, name, slug]
              properties:
                organizationId: { type: string, example: "60d5ecb8b392d700153ef100" }
                name: { type: string, example: "شعبه ونک" }
                slug: { type: string, example: "vanak" }
                phone: { type: string, example: "02112345678" }
                image: { type: string, format: binary, description: "لوگوی شعبه" }
      responses:
        '201': { description: "شعبه ساخته شد" }

  /api/v1/branches/search/nearby:
    get:
      tags: [4. Branches]
      summary: جستجوی شعب اطراف | Search Nearby Branches
      description: پیدا کردن شعب نزدیک بر اساس مختصات جغرافیایی.
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
          description: عرض جغرافیایی
        - in: query
          name: lng
          required: true
          schema: { type: number }
          description: طول جغرافیایی
        - in: query
          name: distance
          required: true
          schema: { type: number }
          description: شعاع جستجو به متر
      responses:
        '200': { description: "شعب اطراف پیدا شدند" }

  /api/v1/branches/{identifier}:
    get:
      tags: [4. Branches]
      summary: اطلاعات یک شعبه | Get Branch
      description: دریافت اطلاعات شعبه با ID یا slug.
      parameters:
        - in: path
          name: identifier
          required: true
          schema: { type: string }
      responses:
        '200': { description: "اطلاعات دریافت شد" }
        '404': { description: "شعبه پیدا نشد" }

    patch:
      tags: [4. Branches]
      summary: ویرایش شعبه | Update Branch
      description: ویرایش نام، آدرس یا لوگوی شعبه (نیاز به دسترسی BRN-601).
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: identifier
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                image: { type: string, format: binary }
      responses:
        '200': { description: "ویرایش شد" }

  /api/v1/branches/{id}/status:
    patch:
      tags: [4. Branches]
      summary: فعال/غیرفعال کردن شعبه (سوپرادمین) | Toggle Branch Status
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive: { type: boolean, example: false }
      responses:
        '200': { description: "وضعیت تغییر کرد" }

  # ==========================================
  # 5. Menu & Products
  # ==========================================
  /api/v1/menu:
    get:
      tags: [5. Menu & Products]
      summary: دریافت منو | Get Menu
      description: دریافت لیست غذاهای یک شعبه خاص.
      parameters:
        - in: query
          name: branchId
          required: true
          schema: { type: string }
          description: آیدی شعبه
      responses:
        '200': { description: "منو دریافت شد" }

    post:
      tags: [5. Menu & Products]
      summary: افزودن غذا | Add Menu Item
      description: اضافه کردن غذای جدید به منو (نیاز به دسترسی MNU-102).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, price, category]
              properties:
                name: { type: string, example: "پیتزا پپرونی" }
                price: { type: number, example: 250000 }
                category: { type: string, example: "پیتزا" }
                image: { type: string, format: binary }
      responses:
        '201': { description: "غذا اضافه شد" }

  /api/v1/menu/{id}:
    get:
      tags: [5. Menu & Products]
      summary: جزئیات غذا | Get Menu Item
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: "اطلاعات غذا دریافت شد" }

    patch:
      tags: [5. Menu & Products]
      summary: ویرایش غذا | Update Menu Item
      description: نیاز به دسترسی MNU-103.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                price: { type: number }
                isAvailable: { type: boolean }
                image: { type: string, format: binary }
      responses:
        '200': { description: "غذا ویرایش شد" }

    delete:
      tags: [5. Menu & Products]
      summary: بایگانی غذا | Archive Menu Item
      description: نیاز به دسترسی MNU-104.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: "غذا بایگانی شد" }

  # ==========================================
  # 6. Cart & Orders
  # ==========================================
  /api/v1/carts:
    get:
      tags: [6. Cart & Orders]
      summary: سبد خرید فعلی | Get Current Cart
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: branchId
          required: true
          schema: { type: string }
      responses:
        '200': { description: "سبد خرید دریافت شد" }

    post:
      tags: [6. Cart & Orders]
      summary: همگام‌سازی سبد خرید | Sync Cart
      description: ارسال آیتم‌ها و ووچر اختیاری برای ساخت/آپدیت سبد خرید.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, branchId]
              properties:
                branchId: { type: string, example: "60d5ecb8b392d700153ef123" }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      menuItemId: { type: string }
                      quantity: { type: number, example: 2 }
                voucherId: { type: string, description: "آیدی ووچر تخفیف (اختیاری)" }
      responses:
        '200': { description: "سبد خرید همگام‌سازی شد" }

  /api/v1/carts/{cartId}/finalize:
    post:
      tags: [6. Cart & Orders]
      summary: نهایی کردن سفارش | Finalize Order
      description: تبدیل سبد خرید به سفارش قطعی و نمایش کد صندوق به گارسون.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: cartId
          required: true
          schema: { type: string }
      responses:
        '200': { description: "سفارش ثبت شد — کد صندوق (posCode) برگردانده می‌شود" }
        '404': { description: "سبد خرید فعالی پیدا نشد" }

  # ==========================================
  # 7. Gamification & Campaigns
  # ==========================================
  /api/v1/campaigns:
    get:
      tags: [7. Gamification & Campaigns]
      summary: لیست مسابقات فعال | Get Campaigns
      description: سوالات برای مشتریان بدون جواب صحیح نمایش داده می‌شود.
      security:
        - BearerAuth: []
      responses:
        '200': { description: "لیست دریافت شد" }

    post:
      tags: [7. Gamification & Campaigns]
      summary: ساخت کمپین جدید | Create Campaign
      description: ساخت مسابقه با سوالات، تایرهای جایزه و شرایط زمانی.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, startDate, endDate, questions, tiers]
              properties:
                title: { type: string, example: "مسابقه هفتگی" }
                startDate: { type: string, format: date-time }
                endDate: { type: string, format: date-time }
                questions:
                  type: array
                  items:
                    type: object
                    properties:
                      questionText: { type: string }
                      options: { type: array, items: { type: string } }
                      correctOptionIndex: { type: number }
                tiers:
                  type: array
                  items:
                    type: object
                    properties:
                      requiredCorrectAnswers: { type: number }
                      discountPercentage: { type: number }
                      maxDiscountAmount: { type: number }
                      validityDays: { type: number }
                      posCode: { type: string }
      responses:
        '201': { description: "کمپین ساخته شد" }

  /api/v1/campaigns/my-vouchers:
    get:
      tags: [7. Gamification & Campaigns]
      summary: کدهای تخفیف من | My Vouchers
      description: لیست ووچرهای فعال و استفاده‌نشده مشتری.
      security:
        - BearerAuth: []
      responses:
        '200': { description: "لیست دریافت شد" }

  /api/v1/campaigns/{campaignId}/play:
    post:
      tags: [7. Gamification & Campaigns]
      summary: شرکت در مسابقه | Submit Quiz Answers
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: campaignId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items: { type: number }
                  example: [0, 2, 1]
      responses:
        '201': { description: "برنده شدید — ووچر صادر شد" }
        '200': { description: "امتیاز کافی نبود" }
        '403': { description: "قبلاً شرکت کرده‌اید" }

  # ==========================================
  # 8. CRM & Customers
  # ==========================================
  /api/v1/crm/customers:
    get:
      tags: [8. CRM & Customers]
      summary: لیست مشتریان شعبه | Get Customers
      description: لیست مشتریان با محاسبه LTV (نیاز به دسترسی CRM-501).
      security:
        - BearerAuth: []
      responses:
        '200': { description: "لیست دریافت شد" }

  /api/v1/crm/customers/{customerId}:
    get:
      tags: [8. CRM & Customers]
      summary: پرونده مشتری | Customer Profile
      description: تاریخچه سفارشات، غذاهای مورد علاقه و آمار مشتری.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: customerId
          required: true
          schema: { type: string }
      responses:
        '200': { description: "پرونده دریافت شد" }

  /api/v1/crm/segments:
    get:
      tags: [8. CRM & Customers]
      summary: بخش‌بندی مشتریان | Customer Segments
      description: تقسیم‌بندی به VIP، در معرض ریزش و وفادار جدید.
      security:
        - BearerAuth: []
      responses:
        '200': { description: "آمار بخش‌ها دریافت شد" }

  /api/v1/crm/send-bulk-sms:
    post:
      tags: [8. CRM & Customers]
      summary: پیامک گروهی | Send Bulk SMS
      description: هزینه از کیف پول پیامکی سازمان مادر کسر می‌شود (نیاز به CRM-502).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetCustomerIds, message]
              properties:
                targetCustomerIds:
                  type: array
                  items: { type: string }
                message: { type: string, example: "تخفیف ویژه امشب! منتظرتون هستیم." }
      responses:
        '200': { description: "پیامک‌ها ارسال شدند" }
        '403': { description: "موجودی پیامکی سازمان کافی نیست" }

  # ==========================================
  # 9. QR Codes
