  /api/v1/qrcode/generate:
    post:
      tags: [9. QR Codes]
      summary: تولید بارکد میزها | Generate QR Codes
      description: تولید تصویر Base64 بارکد برای میزهای شعبه (نیاز به QRC-701).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tableNumbers]
              properties:
                tableNumbers:
                  type: array
                  items: { type: number }
                  example: [1, 2, 3, 4, 5]
      responses:
        '200': { description: "بارکدها تولید شدند" }

