      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: branchId
          required: true
          schema: { type: string }
        - in: query
          name: start
          schema: { type: string, format: date }
          description: تاریخ شروع (اختیاری)
        - in: query
          name: end
          schema: { type: string, format: date }
          description: تاریخ پایان (اختیاری)
      responses:
        '200': { description: "آمار دریافت شد" }

  /api/v1/analytics/sales-chart:
    get:
      tags: [10. Analytics & Reports]
