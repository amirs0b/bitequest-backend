      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: branchId
          required: true
          schema: { type: string }
      responses:
        '200': { description: "دیتای نمودار دریافت شد" }

  /api/v1/analytics/top-items:
    get:
      tags: [10. Analytics & Reports]
      summary: پرفروش‌ترین غذاها | Top Selling Items
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: branchId
          required: true
          schema: { type: string }
      responses:
        '200': { description: "لیست پرفروش‌ها دریافت شد" }

  /api/v1/analytics/roi:
    get:
      tags: [10. Analytics & Reports]
      summary: تحلیل ROI گیمیفیکیشن | Campaign ROI
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: branchId
          required: true
          schema: { type: string }
      responses:
        '200': { description: "تحلیل دریافت شد" }

  # ==========================================
  # 11. Ticketing Support
  # ==========================================
  /api/v1/tickets:
    get:
      tags: [11. Ticketing Support]
      summary: لیست تیکت‌ها | Get Tickets
      description: نیاز به دسترسی TKT-801.
      security:
        - BearerAuth: []
      responses:
        '200': { description: "لیست دریافت شد" }

    post:
      tags: [11. Ticketing Support]
      summary: ثبت تیکت جدید | Create Ticket
      description: نیاز به دسترسی TKT-802. پشتیبانی از آپلود چندین فایل.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [subject, message]
              properties:
                subject: { type: string, example: "مشکل در ثبت سفارش" }
                department: { type: string, enum: [Technical, Billing, Sales, General], example: "Technical" }
                priority: { type: string, enum: [Low, Medium, High, Critical], example: "Medium" }
                message: { type: string, example: "سیستم خطای ۵۰۰ می‌دهد." }
                images:
                  type: array
                  items: { type: string, format: binary }
      responses:
        '201': { description: "تیکت ثبت شد" }

  /api/v1/tickets/{id}:
    get:
      tags: [11. Ticketing Support]
      summary: جزئیات تیکت | Get Ticket
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: "تیکت با تمام پیام‌ها دریافت شد" }

  /api/v1/tickets/{id}/reply:
    post:
      tags: [11. Ticketing Support]
      summary: پاسخ به تیکت | Reply to Ticket
      description: نیاز به دسترسی TKT-803.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
                images:
                  type: array
                  items: { type: string, format: binary }
      responses:
        '200': { description: "پاسخ ثبت شد" }

  /api/v1/tickets/{id}/status:
    patch:
      tags: [11. Ticketing Support]
      summary: تغییر وضعیت تیکت | Update Ticket Status
      description: نیاز به دسترسی TKT-804.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [Open, In Progress, Waiting on Customer, Resolved, Closed] }
      responses:
        '200': { description: "وضعیت تغییر کرد" }

  # ==========================================
  # 12. Audit Logs
  # ==========================================
  /api/v1/audit-logs:
    get:
      tags: [12. Audit Logs]
      summary: لاگ فعالیت‌ها | Get Audit Logs
      description: ردگیری فعالیت‌های پرسنل (فقط مالک شعبه و سوپرادمین).
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: sort
          schema: { type: string, default: "-createdAt" }
        - in: query
          name: category
          schema: { type: string, enum: [security, kpi, system] }
        - in: query
          name: page
          schema: { type: number, default: 1 }
        - in: query
          name: limit
          schema: { type: number, default: 10 }
      responses:
        '200': { description: "لاگ‌ها دریافت شدند" }

